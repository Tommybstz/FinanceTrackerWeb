<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1 id="title">Finance Tracker</h1>


        <div class="add-transaction">
            <div class="input-add-container">
                <input type="text" id="type" class="input-group" placeholder="Type (income/expense)">
                <input type="text" id="category" class="input-group" placeholder="Category">
                <input type="number" id="amount" class="input-group" placeholder="Amount">
                <input type="date" id="date" class="input-group" placeholder="Date">
                <input type="text" id="note" class="input-group" placeholder="Description">
            </div>
            <button type="button" id="addTransaction" class="btn" onclick="addTransaction()">Add Transaction</button>
        </div>

        <div class="update-transaction">
            <div class="input-update-container">
                <input type="text" id="updateId" class="input-group" placeholder="Transaction ID">
                <input type="text" id="updateType" class="input-group" placeholder="Type (income/expense)">
                <input type="text" id="updateCategory" class="input-group" placeholder="Category">
                <input type="number" id="updateAmount" class="input-group" placeholder="Amount">
                <input type="date" id="updateDate" class="input-group" placeholder="Date">
                <input type="text" id="updateNote" class="input-group" placeholder="Description">
            </div>
            <button type="button" id="updateTransaction" class="btn" onclick="updateTransaction()">Update
                Transaction</button>
        </div>

        <div class="delete-transaction">
            <input type="text" id="deleteId" class="input-group" placeholder="Transaction ID">
            <button type="button" id="deleteTransaction" class="btn" onclick=" deleteTransaction()">Delete
                Transaction</button>
            <button type="button" id="deleteLastTransactions" class="btn" onclick="deleteLastTransaction()">Delete Last
                Transaction</button>
        </div>
        <div class="view-summary">
            <button type="button" id="viewSummary" class="btn" onclick="viewSummary()">View Summary</button>
            <div id="summary"></div>
        </div>

        <div class="transactions-container">
            <div class="transaction-header">
                <span>ID</span>
                <span>Type</span>
                <span>Category</span>
                <span>Amount</span>
                <span>Date</span>
                <span>Note</span>
            </div>
            <div id="transactions" class="transactions-list"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
